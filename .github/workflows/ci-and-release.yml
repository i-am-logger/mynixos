name: CI and Release
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
permissions:
  contents: write
  pull-requests: write
jobs:
  nix-flake-check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    # Skip CI for release-please PRs and release merges (only version bumps)
    if: |
      !(
        (github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore(master): release')) ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, 'release-please--branches--master'))
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org https://cache.nixos.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
      - name: Run nix flake check
        run: nix flake check --print-build-logs
  nix-lint:
    name: Nix Lint (statix + deadnix)
    runs-on: ubuntu-latest
    if: |
      !(
        (github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore(master): release')) ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, 'release-please--branches--master'))
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
      - name: Run statix
        run: nix run nixpkgs#statix -- check .
      - name: Run deadnix
        run: nix run nixpkgs#deadnix -- --fail .
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    # Run on push to master, regardless of whether CI was skipped (release merges) or passed (regular merges)
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      (needs.nix-flake-check.result == 'success' || needs.nix-flake-check.result == 'skipped') &&
      (needs.nix-lint.result == 'success' || needs.nix-lint.result == 'skipped')
    needs: [nix-flake-check, nix-lint]
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
